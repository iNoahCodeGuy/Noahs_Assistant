name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run unit tests
        # Hermetic tests only — no network calls, so placeholder values satisfy
        # import-time config checks. The legacy suite is being repaired
        # incrementally; files are added here as they go green.
        env:
          OPENAI_API_KEY: sk-placeholder-for-hermetic-tests
          ANTHROPIC_API_KEY: sk-ant-placeholder-for-hermetic-tests
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          SUPABASE_KEY: placeholder
        run: |
          pytest tests/test_documentation_alignment.py tests/test_memory.py tests/test_roles.py -v
